# =============================================================================
# HomeComf — Continuous Deployment Pipeline
# Builds Docker image, runs security scans, and deploys on push to master
# =============================================================================

name: CD Pipeline

on:
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      deploy_to:
        description: 'Deployment target'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  DOCKER_BUILDKIT: 1

jobs:
  # ─── Job 1: Docker Build & Security Scan ──────────────────────────────────
  docker:
    name: Build & Scan Docker Image
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short
            type=ref,event=branch
            type=semver,pattern={{version}}

      # ─── Build Docker Image ─────────────────────────────────────────────
      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_API_BASE_URL=${{ secrets.NEXT_PUBLIC_API_BASE_URL || 'http://localhost:5000' }}

      # ─── Vulnerability Scanning ──────────────────────────────────────────
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: '0' # Don't fail pipeline on vulnerabilities (informational)

      - name: Upload Trivy scan results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
          category: trivy

      # ─── Docker Scout (Image Analysis) ───────────────────────────────────
      - name: Run Docker Scout quickview
        uses: docker/scout-action@v1
        with:
          command: quickview
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          only-severities: critical,high
          exit-code: false

  # ─── Job 2: Deploy (optional) ─────────────────────────────────────────────
  deploy:
    name: Deploy Application
    runs-on: ubuntu-latest
    needs: [docker]
    timeout-minutes: 15
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'

    steps:
      - name: Deploy via SSH (example)
        run: |
          echo "============================================"
          echo "  Deployment Step"
          echo "============================================"
          echo "  Image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"
          echo ""
          echo "  To deploy, configure one of these methods:"
          echo "  1. SSH deploy: add SSH_PRIVATE_KEY and HOST secrets"
          echo "  2. Vercel: add VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID"
          echo "  3. Kubernetes: configure kubeconfig secret"
          echo "============================================"

      # Example SSH deploy (uncomment and configure secrets to enable):
      # - name: Deploy via SSH
      #   uses: appleboy/ssh-action@v1.0.3
      #   with:
      #     host: ${{ secrets.DEPLOY_HOST }}
      #     username: ${{ secrets.DEPLOY_USER }}
      #     key: ${{ secrets.SSH_PRIVATE_KEY }}
      #     script: |
      #       docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
      #       docker stop homecomf || true
      #       docker rm homecomf || true
      #       docker run -d \
      #         --name homecomf \
      #         --restart unless-stopped \
      #         -p 3000:3000 \
      #         -e NODE_ENV=production \
      #         ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

  # ─── Job 3: Software Bill of Materials (SBOM) ─────────────────────────────
  sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest
    needs: [docker]
    timeout-minutes: 10
    permissions:
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate SBOM with Syft
        uses: anchore/syft-action@v0.17.0
        with:
          path: .
          format: spdx-json
          output: sbom.spdx.json

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.spdx.json
          retention-days: 30
